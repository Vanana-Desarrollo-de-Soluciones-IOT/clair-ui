<aside class="sidebar-container" [class.collapsed]="!isOpen">
  <!-- Search -->
  <div *ngIf="isOpen" class="search-wrapper">
    <mat-icon class="search-icon">search</mat-icon>
    <input type="text" placeholder="Search" class="search-input" />
  </div>

  <!-- Navigation -->
  <nav class="nav-list">
    <a
      *ngFor="let item of navItems"
      class="nav-item"
      [routerLink]="item.route || null"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      (click)="onNavItemClick()"
    >
      <mat-icon>{{ item.icon }}</mat-icon>
      <span *ngIf="isOpen">{{ item.label }}</span>
    </a>
  </nav>

  <!-- Settings -->
  <div class="settings-wrapper">
    <a class="nav-item" routerLink="/settings" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="onNavItemClick()">
      <mat-icon>settings</mat-icon>
      <span *ngIf="isOpen">Settings</span>
    </a>
  </div>
</aside>
