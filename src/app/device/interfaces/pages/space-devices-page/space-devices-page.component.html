<div class="page-layout">
  <app-header [isSidebarOpen]="isSidebarOpen" (sidebarToggleRequested)="toggleSidebar()"></app-header>

  <div class="page-body">
    <app-sidebar [isOpen]="isSidebarOpen" (closeRequested)="closeSidebar()"></app-sidebar>

    <main class="content">
      <div class="workspace">
        <!-- Left panel: Organizations -->
        <app-organizations-bar
          [organizations]="organizations"
          [expandedOrganizationIds]="expandedOrganizationIds"
          [spacesByOrganizationId]="spacesByOrganizationId"
          [loadingSpacesByOrganizationId]="loadingSpacesByOrganizationId"
          [errorSpacesByOrganizationId]="errorSpacesByOrganizationId"
          [deviceCountsBySpaceId]="deviceCountsBySpaceId"
          [selectedSpaceId]="selectedSpaceId?.value ?? null"
          (organizationToggled)="toggleOrganization($event)"
          (spaceSelected)="selectSpace($event)"
          (addSpaceRequested)="openAddSpaceDialog($event)"
          (addOrganizationRequested)="openAddOrganizationDialog()"
        ></app-organizations-bar>

        <!-- Right panel: Spaces & Devices -->
        <section class="detail-panel">
          <div *ngIf="selectedSpace" class="detail-header">
            <div class="detail-title">
              <h1>{{ selectedSpace.name }}</h1>
              <p class="subtitle">Updates every minute</p>
            </div>
            <div class="detail-actions">
              <div class="view-toggle">
                <button mat-icon-button [class.active]="viewMode === 'grid'" (click)="setViewMode('grid')" aria-label="Grid view">
                  <mat-icon>grid_view</mat-icon>
                </button>
                <button mat-icon-button [class.active]="viewMode === 'list'" (click)="setViewMode('list')" aria-label="List view">
                  <mat-icon>view_list</mat-icon>
                </button>
              </div>
              <button mat-fab color="primary" (click)="openAddSpaceDialog()" aria-label="Add space">
                <mat-icon>add</mat-icon>
              </button>
              <button mat-fab color="accent" (click)="openRegisterDeviceDialog()" aria-label="Register device">
                <mat-icon>devices</mat-icon>
              </button>
            </div>
          </div>

          <div *ngIf="!selectedSpace && !loadingSpaces" class="empty-state centered">
            Select an organization with spaces to view devices.
          </div>

          <div *ngIf="loadingDevices" class="loading-state centered">
            <mat-spinner diameter="24"></mat-spinner>
            <span>Loading devices...</span>
          </div>

          <div *ngIf="errorDevices && !loadingDevices" class="error-state centered">{{ errorDevices }}</div>

          <div *ngIf="!loadingDevices && devicesPage && devicesPage.content.length === 0" class="empty-state centered">
            No devices registered in this space.
          </div>

          <div *ngIf="!loadingDevices && devicesPage && devicesPage.content.length > 0" [class.device-grid]="viewMode === 'grid'" [class.device-list]="viewMode === 'list'">
            <app-device-card
              *ngFor="let device of devicesPage.content"
              [device]="device"
              [viewMode]="viewMode"
            ></app-device-card>
          </div>
        </section>
      </div>
    </main>
  </div>
</div>
