<div *ngIf="space" class="detail-header">
  <div class="detail-title">
    <h1>{{ space.name }}</h1>
    <p class="subtitle">Updates every minute</p>
  </div>
  <div class="detail-actions">
    <button mat-fab class="action-button action-button--primary" type="button" (click)="requestRegisterDevice()" aria-label="Register device">
      <mat-icon>add</mat-icon>
    </button>
    <button mat-fab class="action-button action-button--secondary" type="button" aria-label="More options">
      <mat-icon>more_vert</mat-icon>
    </button>
  </div>
</div>
