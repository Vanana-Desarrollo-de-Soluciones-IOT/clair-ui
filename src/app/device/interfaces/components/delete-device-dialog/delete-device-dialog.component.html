<h2 mat-dialog-title>Delete Device</h2>
<mat-dialog-content>
  <p>Are you sure you want to delete <strong>{{ data.deviceName }}</strong>? This action cannot be undone.</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="warn" (click)="confirm()">Delete</button>
</mat-dialog-actions>
