<h2 mat-dialog-title>Register Device</h2>
<mat-dialog-content>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Serial Number</mat-label>
      <input matInput formControlName="serialNumber" placeholder="Enter serial number" />
      <mat-error *ngIf="form.get('serialNumber')?.hasError('required')">Serial number is required</mat-error>
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Device Name</mat-label>
      <input matInput formControlName="name" placeholder="Enter device name" />
      <mat-error *ngIf="form.get('name')?.hasError('required')">Name is required</mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" [disabled]="form.invalid" (click)="submit()">Register</button>
</mat-dialog-actions>
