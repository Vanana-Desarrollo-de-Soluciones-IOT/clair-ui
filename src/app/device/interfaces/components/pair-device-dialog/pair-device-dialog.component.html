<h2 mat-dialog-title>Pair Sensor Hardware</h2>
<mat-dialog-content>
  <p class="description">Pair a physical CO2/PM2.5 sensor by hardware ID to create or retrieve its claim token.</p>
  <form [formGroup]="form" (ngSubmit)="submit()">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Hardware ID</mat-label>
      <input matInput formControlName="hardwareId" placeholder="CLAIR-0001" autocomplete="off" />
      <mat-error *ngIf="form.get('hardwareId')?.hasError('required')">Hardware ID is required</mat-error>
      <mat-error *ngIf="form.get('hardwareId')?.hasError('pattern')">Hardware ID must match CLAIR-0001</mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" type="button" [disabled]="form.invalid" (click)="submit()">Pair</button>
</mat-dialog-actions>
