<div class="device-detail-container">
  <!-- Device Info Card -->
  <app-device-info-card
    [device]="device"
    (backRequested)="onBackRequested()"
    (editRequested)="onEditRequested()"
    (deleteRequested)="onDeleteRequested()"
    (powerToggleRequested)="onPowerToggleRequested()"
  ></app-device-info-card>

  <!-- Device Thresholds Card -->
  <app-device-thresholds-card
    [deviceId]="device.id.value"
    (editRequested)="onEditThresholdsRequested()"
  ></app-device-thresholds-card>
</div>
