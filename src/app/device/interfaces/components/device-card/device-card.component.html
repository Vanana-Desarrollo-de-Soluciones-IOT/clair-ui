<mat-card *ngIf="viewMode === 'grid'" class="device-card">
  <div class="card-header">
    <span class="badge">{{ device.name }}</span>
    <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Device options">
      <mat-icon>more_vert</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item>View details</button>
      <button mat-menu-item>Update status</button>
      <button mat-menu-item>Update configuration</button>
    </mat-menu>
  </div>
  <div class="card-body">
    <h3 class="device-name">{{ device.serialNumber }}</h3>
    <span class="status-dot" [style.backgroundColor]="statusColor(device.status)"></span>
  </div>
  <div class="card-footer">
    <mat-icon class="footer-icon">history</mat-icon>
    <span class="footer-text">Updated {{ device.updatedAt | date:'short' }}</span>
    <button mat-icon-button aria-label="Go to device">
      <mat-icon>arrow_forward</mat-icon>
    </button>
  </div>
</mat-card>

<div *ngIf="viewMode === 'list'" class="device-list-item">
  <div class="list-info">
    <span class="list-name">{{ device.name }}</span>
    <span class="list-serial">{{ device.serialNumber }}</span>
    <span class="list-status" [style.color]="statusColor(device.status)">{{ device.status }}</span>
  </div>
  <div class="list-meta">
    <span class="list-date">{{ device.updatedAt | date:'short' }}</span>
    <button mat-icon-button aria-label="Device options">
      <mat-icon>more_vert</mat-icon>
    </button>
  </div>
</div>
