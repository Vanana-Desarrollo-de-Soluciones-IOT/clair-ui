<h2 mat-dialog-title>Delete Organization</h2>
<mat-dialog-content>
  <p>Are you sure you want to delete this organization? This action cannot be undone.</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="warn" (click)="confirm()">Delete</button>
</mat-dialog-actions>
