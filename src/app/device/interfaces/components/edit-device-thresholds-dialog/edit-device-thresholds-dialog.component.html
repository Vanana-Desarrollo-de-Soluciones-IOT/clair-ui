<div class="thresholds-modal">
  <div class="modal-header">
    <button type="button" class="close-button" (click)="cancel()" aria-label="Close thresholds">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 1L17 17M17 1L1 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div class="modal-body">
    <div class="columns" [class.is-loading]="loading">
      <div *ngFor="let cfg of sliderConfigs" class="metric-column" [formGroup]="getMetricForm(cfg.metric)">
        <div class="metric-name">{{ metricDetails(cfg.metric).label }}</div>
        <div class="metric-divider"></div>

        <div class="metric-value-row">
          <div class="metric-value">{{ getMetricValue(cfg.metric) | number:'1.0-2' }}</div>
          <div class="metric-unit">{{ metricDetails(cfg.metric).unit }}</div>
        </div>

        <div class="metric-max-label">max</div>

        <div class="slider-wrap"
             role="slider"
             [attr.aria-valuemin]="cfg.min"
             [attr.aria-valuemax]="cfg.max"
             [attr.aria-valuenow]="getMetricValue(cfg.metric)"
             [attr.aria-label]="metricDetails(cfg.metric).label + ' threshold slider'"
             [style.--slider-percent.%]="getSliderPercent(cfg.metric)"
             (mousedown)="onSliderPointerDown($event, cfg.metric)"
             (touchstart)="onSliderPointerDown($event, cfg.metric)">
          <div class="slider-track-bg"></div>
          <div class="slider-track-fill"></div>
          <div class="slider-thumb"></div>
        </div>
      </div>
    </div>
    
    <div class="loading-overlay" *ngIf="loading">
      <mat-spinner diameter="28"></mat-spinner>
      <span>Loading thresholds...</span>
    </div>
  </div>

  <div class="modal-footer">
    <button class="footer-button footer-button--secondary" type="button" (click)="reset()" [disabled]="saving">
      RESET
    </button>
    <button class="footer-button footer-button--primary" type="button" (click)="save()" [disabled]="saving || form.invalid">
      <span *ngIf="!saving">SAVE</span>
      <span *ngIf="saving">SAVING...</span>
    </button>
  </div>
</div>
