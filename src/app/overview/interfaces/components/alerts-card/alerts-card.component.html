<article class="alerts-card">
  <div class="alerts-header">
    <div>
      <h2>{{ title }}</h2>
      <p>{{ subtitle }}</p>
    </div>
  </div>

  <div class="alerts-list" *ngIf="hasAlerts; else emptyState">
    <div class="alerts-item" *ngFor="let alert of alerts">
      <span [class]="getSeverityClass(alert)"></span>
      <span class="alerts-item-label">{{ getAlertLabel(alert) }}</span>
      <span class="alerts-item-time">{{ getAlertTime(alert) }}</span>
    </div>
  </div>

  <ng-template #emptyState>
    <div class="alerts-empty">{{ emptyLabel }}</div>
  </ng-template>
</article>
