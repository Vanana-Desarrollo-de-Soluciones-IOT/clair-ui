<div class="toolbar">
  <div class="view-toggle">
    <button mat-icon-button [class.active]="viewMode === 'grid'" (click)="setViewMode('grid')" aria-label="Grid view">
      <mat-icon>grid_view</mat-icon>
    </button>
    <button mat-icon-button [class.active]="viewMode === 'list'" (click)="setViewMode('list')" aria-label="List view">
      <mat-icon>view_list</mat-icon>
    </button>
  </div>
</div>

<div *ngIf="loading" class="loading-state">
  <mat-spinner diameter="40"></mat-spinner>
  <span>Loading alerts...</span>
</div>

<div *ngIf="!loading && error" class="error-state">
  <mat-icon>error_outline</mat-icon>
  <span>{{ error }}</span>
</div>

<div *ngIf="!loading && !error && (!alerts || alerts.length === 0)" class="empty-state">
  <mat-icon>notifications_off</mat-icon>
  <span>No alerts found</span>
</div>

<div *ngIf="!loading && !error && alerts && alerts.length > 0" class="alerts-container" [class.grid]="viewMode === 'grid'" [class.list]="viewMode === 'list'">
  <app-alert-card *ngFor="let alert of alerts" [alert]="alert"></app-alert-card>
</div>
