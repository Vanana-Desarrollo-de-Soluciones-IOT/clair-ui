<div class="chart-card">
  <div class="chart-header">
    <span class="chart-title">Last 30 days</span>
    <div class="chart-icon" aria-hidden="true">
      <span class="dot"></span>
    </div>
  </div>

  <div class="chart-body">
    <div class="grid" aria-hidden="true"></div>
    <div class="bars-container">
      <div class="bar-wrapper" *ngFor="let bar of chartBars">
        <div class="bar" [style.height.%]="bar.heightPct" [style.backgroundColor]="bar.color"></div>
      </div>
    </div>
  </div>

  <div class="chart-footer">
    <span class="footer-label">Hace 30 días</span>
    <span class="footer-label">Today</span>
  </div>
</div>
