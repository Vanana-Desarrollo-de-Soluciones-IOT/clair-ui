<div class="page-layout">
  <app-header [isSidebarOpen]="isSidebarOpen" (sidebarToggleRequested)="toggleSidebar()"></app-header>

  <div class="page-body">
    <app-sidebar [isOpen]="isSidebarOpen" (closeRequested)="closeSidebar()"></app-sidebar>

    <main class="content">
      <div class="alerts-container">
        <!-- Header -->
        <div class="page-header">
          <h1 class="page-title">Alerts</h1>
          <mat-icon class="header-icon">calendar_today</mat-icon>
        </div>

        <!-- Dropdowns -->
        <div class="dropdowns-row">
          <div class="dropdown-item">
            <label class="dropdown-label">ORGANIZATION</label>
            <mat-form-field appearance="outline" class="custom-select-field">
              <mat-select [(ngModel)]="selectedOrgId" (selectionChange)="onOrgChange()">
                <mat-option *ngFor="let org of organizations" [value]="org.id">{{ org.name }}</mat-option>
              </mat-select>
            </mat-form-field>
          </div>

          <div class="dropdown-item">
            <label class="dropdown-label">SPACE</label>
            <mat-form-field appearance="outline" class="custom-select-field">
              <mat-select [(ngModel)]="selectedSpaceId" (selectionChange)="onSpaceChange()">
                <mat-option *ngFor="let space of spaces" [value]="space.id">{{ space.name }}</mat-option>
              </mat-select>
            </mat-form-field>
          </div>

          <div class="dropdown-item">
            <label class="dropdown-label">DEVICE (optional)</label>
            <mat-form-field appearance="outline" class="custom-select-field">
              <mat-select [(ngModel)]="selectedDeviceId" (selectionChange)="onDeviceChange()">
                <mat-option value="">All devices in space</mat-option>
                <mat-option *ngFor="let device of devices" [value]="device.id">{{ device.name }}</mat-option>
              </mat-select>
            </mat-form-field>
          </div>
        </div>

        <!-- Daily Chart -->
        <app-alert-daily-chart [data]="dailySummary"></app-alert-daily-chart>

        <!-- Update info -->
        <div class="update-info">
          <mat-icon class="update-icon">sync</mat-icon>
          <span>Updated {{ formattedUpdateTime }}</span>
        </div>

        <!-- Tabs -->
        <div class="tabs-row">
          <button class="tab-btn" [class.active]="activeTab === 'active'" (click)="setTab('active')">
            Active Alerts
          </button>
          <button class="tab-btn" [class.active]="activeTab === 'history'" (click)="setTab('history')">
            History
          </button>
        </div>

        <!-- Table -->
        <app-alert-table [alerts]="currentAlerts" [loading]="loadingAlerts"></app-alert-table>

        <!-- Pagination -->
        <div class="pagination-bar" *ngIf="showPagination">
          <button mat-button (click)="prevPage()" [disabled]="currentPage === 0">
            <mat-icon>chevron_left</mat-icon> Previous
          </button>
          <span class="page-info">Page {{ currentPage + 1 }} of {{ totalPages }}</span>
          <button mat-button (click)="nextPage()" [disabled]="currentPage >= totalPages - 1">
            Next <mat-icon>chevron_right</mat-icon>
          </button>
        </div>
      </div>
    </main>
  </div>
</div>
