<mat-card class="plan-card" appearance="outlined">
  <div class="plan-header">
    <img src="https://storage.googleapis.com/tagjs-prod.appspot.com/v1/9pEVa5rDhG/gy6vis8k_expires_30_days.png"
      class="plan-icon" />
    <h2 class="plan-title">Free</h2>
  </div>

  <div class="plan-price-section">
    <h3 class="plan-price">S/ 0</h3>
    <p class="plan-price-subtitle">Free for everyone</p>
  </div>

  <button class="submit-button" (click)="onPress()">
    Try Clair
  </button>

  <div class="features-list">
    <div class="feature-item">
      <img src="https://storage.googleapis.com/tagjs-prod.appspot.com/v1/9pEVa5rDhG/dy1yfzb4_expires_30_days.png"
        class="feature-icon" />
      <p class="feature-text">Support for one Clair Alpha</p>
    </div>
    <div class="feature-item">
      <img src="https://storage.googleapis.com/tagjs-prod.appspot.com/v1/9pEVa5rDhG/au3um98v_expires_30_days.png"
        class="feature-icon" />
      <p class="feature-text">Real-time CO2 and particulate matter tracking</p>
    </div>
    <div class="feature-item">
      <img src="https://storage.googleapis.com/tagjs-prod.appspot.com/v1/9pEVa5rDhG/j4pbfd2x_expires_30_days.png"
        class="feature-icon" />
      <p class="feature-text">Live environmental dashboard access</p>
    </div>
  </div>
</mat-card>
