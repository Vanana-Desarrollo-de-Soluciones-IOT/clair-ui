<div class="page-container">
  <button class="back-button" (click)="goBack()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M15 18L9 12L15 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <div class="header-text">
    <h1 class="title">Select your plan</h1>
    <p class="subtitle">Start monitoring your air</p>
  </div>
  
  <div class="cards-container">
    <app-free-plan-card (onSelect)="onPress()"></app-free-plan-card>
    <app-premium-plan-card (onSelect)="onPremiumSelect()"></app-premium-plan-card>
  </div>
</div>
