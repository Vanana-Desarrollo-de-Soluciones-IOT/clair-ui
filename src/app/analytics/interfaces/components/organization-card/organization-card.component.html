<section class="organizations-card">
  <div class="organizations-header">
    <div class="organizations-title">
      <h2>{{ title }}</h2>
    </div>
  </div>

  <div class="organizations-grid" *ngIf="hasOrganizations; else emptyState">
    <article class="organization-item" *ngFor="let organization of organizations">
      <div class="organization-aqi" [ngClass]="getAqiToneClass(organization.aqiValue, organization.aqiCategory)">
        {{ getAqiValue(organization.aqiValue) }}
      </div>
      <div class="organization-meta">
        <h5>{{ getSpaceName(organization.spaceName) }}</h5>
        <span class="organization-owner" *ngIf="organization.organizationName">{{ organization.organizationName }}</span>
        <span class="organization-status">{{ getAqiCategory(organization.aqiCategory) }}</span>
      </div>
    </article>
  </div>

  <ng-template #emptyState>
    <div class="organizations-empty">{{ emptyLabel }}</div>
  </ng-template>
</section>
