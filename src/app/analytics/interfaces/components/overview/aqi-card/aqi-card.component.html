<section class="aqi-card">
  <div class="aqi-header">
    <div class="aqi-title-row">
      <h2>Air Quality Index</h2>
      <span class="status-pill">{{ displayCategory }}</span>
    </div>
    <span class="aqi-score">{{ displayAqiValue }}</span>
  </div>
  <div class="aqi-progress">
    <div class="aqi-progress-bar" [style.width.%]="progressPercent"></div>
  </div>
  <div class="aqi-footer">
    <div class="aqi-meta">
      <p>Average of {{ organizationLabel }}</p>
      <span>{{ updatedLabel }}</span>
      </div>
  </div>
</section>
